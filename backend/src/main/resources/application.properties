spring.application.name=tungzone-backend
spring.config.import=optional:file:.env[.properties]

# Database (override on cloud via env vars)
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/tung_zone?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=${PORT:8085}

# JWT — secret MUST be provided via environment variable in production
# Generate with: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET:12345678901234567890123456789012}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Google OAuth — client ID MUST be provided via environment variable
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Admin seed is off by default. Set both values only when you need to create/rotate an admin account.
app.seed.admin.email=${SEED_ADMIN_EMAIL:}
app.seed.admin.password=${SEED_ADMIN_PASSWORD:}
app.seed.admin.full-name=${SEED_ADMIN_FULL_NAME:System Admin}

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://*.vercel.app}

# MoMo Payment. Provide credentials via environment variables.
app.momo.partner-code=${MOMO_PARTNER_CODE:}
app.momo.access-key=${MOMO_ACCESS_KEY:}
app.momo.secret-key=${MOMO_SECRET_KEY:}
app.momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
app.momo.ipn-url=${MOMO_IPN_URL:http://localhost:8085/api/payments/momo/ipn}
app.momo.redirect-url=${MOMO_REDIRECT_URL:http://localhost:5173/cart}

app.upload.dir=${APP_UPLOAD_DIR:uploads}

# Email notification (password reset/payment information)
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@tungzone.local}}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:5173/login}
app.frontend.orders-url=${FRONTEND_ORDERS_URL:http://localhost:5173/profile?tab=orders}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
