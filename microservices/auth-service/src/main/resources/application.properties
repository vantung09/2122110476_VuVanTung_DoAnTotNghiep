spring.application.name=tungzone-auth-service
server.port=8081

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/tung_zone?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=12345678901234567890123456789012
app.jwt.expiration=86400000
app.google.client-id=692763174418-3qskksrn30vadssdkgbu4gdim5bns98v.apps.googleusercontent.com

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
